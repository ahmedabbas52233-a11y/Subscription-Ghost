<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020510" />

    <!-- SEO -->
    <title>SubscriptionGhost — Never Get Surprised by a Renewal Again</title>
    <meta name="description" content="Track every subscription, get smart pre-alerts before renewals, and optimise your software spend with AI-powered insights." />
    <meta name="keywords" content="subscription tracker, renewal alerts, SaaS management, spending analytics" />
    <link rel="canonical" href="https://subscriptionghost.app" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://subscriptionghost.app" />
    <meta property="og:title"       content="SubscriptionGhost — Never Get Surprised Again" />
    <meta property="og:description" content="Smart subscription tracking with 7/3/1-day renewal alerts." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SubscriptionGhost" />
    <meta name="twitter:description" content="Smart subscription tracking with AI-powered alerts." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon"          href="/apple-touch-icon.png" />

    <!-- Preconnect to Google Fonts (used in the app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical inline style: prevent flash of unstyled background -->
    <style>
      html, body { background: #020510; color: #e8eaf6; margin: 0; padding: 0; }
      #root { min-height: 100vh; }
      /* Loading screen shown before React hydrates */
      #splash {
        position: fixed; inset: 0; background: #020510;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity .4s ease;
      }
      #splash.fade { opacity: 0; pointer-events: none; }
      .splash-inner { text-align: center; }
      .splash-logo {
        width: 56px; height: 56px; border-radius: 14px;
        background: linear-gradient(135deg, #00ff87, #06b6d4);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; margin: 0 auto 16px;
        box-shadow: 0 0 40px rgba(0,255,135,.4);
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      .splash-name {
        font-family: system-ui, sans-serif; font-size: 18px; font-weight: 800;
        color: #e8eaf6; letter-spacing: -.01em;
      }
      .splash-name span { color: #00ff87; }
      .splash-dots { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
      .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #00ff87;
        animation: splashDot 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: .2s; background: #06b6d4; }
      .splash-dots span:nth-child(3) { animation-delay: .4s; background: #bf5af2; }
      @keyframes splashPulse {
        0%,100% { box-shadow: 0 0 40px rgba(0,255,135,.4); }
        50%      { box-shadow: 0 0 70px rgba(0,255,135,.7), 0 0 0 12px rgba(0,255,135,.08); }
      }
      @keyframes splashDot {
        0%,80%,100% { transform: scale(.6); opacity: .4; }
        40%          { transform: scale(1);  opacity: 1;  }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by main.tsx once React mounts -->
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo">👻</div>
        <div class="splash-name">Sub<span>Ghost</span></div>
        <div class="splash-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
